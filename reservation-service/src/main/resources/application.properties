# =============================================================================
# Datasource - PostgreSQL
# (in dev mode, DevServices auto-starts a container if no URL is set)
# =============================================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/reservation_db

# =============================================================================
# Hibernate ORM
# =============================================================================
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# =============================================================================
# HTTP
# =============================================================================
quarkus.http.port=8080

# =============================================================================
# Logging
# =============================================================================
quarkus.log.console.enable=true
quarkus.log.level=INFO
quarkus.log.category."org.hibernate.SQL".level=DEBUG

# =============================================================================
# OpenAPI / Swagger UI
# =============================================================================
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Reservation Service API
quarkus.smallrye-openapi.info-version=1.0.0

# =============================================================================
# REST Client Setup
# =============================================================================
# Local-dev mock fallback if user-service is not found via docker network. 
quarkus.rest-client.user-api.url=http://localhost:8080
