# =============================================================================
# Datasource - PostgreSQL
# (in dev mode, DevServices auto-starts a container if no URL is set)
# =============================================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/user_db

# =============================================================================
# Hibernate ORM
# =============================================================================
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# =============================================================================
# HTTP
# =============================================================================
quarkus.http.port=8080

# =============================================================================
# Logging
# =============================================================================
quarkus.log.console.enable=true
quarkus.log.level=INFO
quarkus.log.category."org.hibernate.SQL".level=DEBUG

# =============================================================================
# OpenAPI / Swagger UI
# =============================================================================
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=User Service API
quarkus.smallrye-openapi.info-version=1.0.0

# =============================================================================
# Test profile: use the already-running local PostgreSQL
# =============================================================================
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/user_db
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.devservices.enabled=false
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.http.test-port=0
%test.quarkus.management.test-port=0
